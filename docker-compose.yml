services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: 21chillie/job-tracker-backend:latest
    container_name: job-tracker-backend
    ports:
      - "3021:3001"
    environment:
      BUN_APP_ENV: ${BUN_APP_ENV:-production}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-change-me-in-env}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3001}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
    volumes:
      - backend_data:/app/src/db
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_BACKEND_URL: ${VITE_BACKEND_URL:-http://localhost:3001}
    image: 21chillie/job-tracker-frontend:latest
    container_name: job-tracker-frontend
    ports:
      - "3020:3000"
    environment:
      HOST: 0.0.0.0
      PORT: 3000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend_data:
